# Global
global:
  imageTag: latest
  environment: production
  domain: kratos.ai

# Core API
coreApi:
  enabled: true
  replicas: 3
  image:
    repository: ghcr.io/kratos/core-api
    tag: "{{ .Values.global.imageTag }}"
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  autoscaling:
    minReplicas: 3
    maxReplicas: 12
    targetCPU: 70
    targetMemory: 80

# BFF
bff:
  enabled: true
  replicas: 3
  image:
    repository: ghcr.io/kratos/bff
    tag: "{{ .Values.global.imageTag }}"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

# Frontend
frontend:
  enabled: true
  replicas: 3
  image:
    repository: ghcr.io/kratos/frontend
    tag: "{{ .Values.global.imageTag }}"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    minReplicas: 2
    maxReplicas: 8
    targetCPU: 60

# Workers
workers:
  agent:
    enabled: true
    replicas: 2
    autoscaling:
      minReplicas: 2
      maxReplicas: 20
  tool:
    enabled: true
    replicas: 1

# Databases
postgres:
  enabled: true
  replicas: 2
  storage: 50Gi
  storageClass: ssd

redis:
  enabled: true
  replicas: 3
  maxMemory: 512mb
  storage: 10Gi
  storageClass: ssd

weaviate:
  enabled: true
  replicas: 1
  storage: 50Gi
  storageClass: ssd

# Ingress
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: true
    issuer: letsencrypt-production
  hosts:
    - kratos.ai

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    scrapeInterval: 15s
  grafana:
    enabled: true
    adminPassword: ""
  jaeger:
    enabled: true

# Security
security:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
  networkPolicy:
    enabled: false

# Backups
backups:
  enabled: true
  schedule: "0 2 * * *"
  retention: 7
  destination: gs://kratos-backups
