apiVersion: v1
kind: Secret
metadata:
  name: kratos-database
  namespace: kratos
type: Opaque
stringData:
  url: "postgresql+asyncpg://kratos:${DB_PASSWORD}@kratos-postgres:5432/kratos"
  password: "${DB_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: kratos-redis
  namespace: kratos
type: Opaque
stringData:
  url: "redis://kratos-redis:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: kratos-jwt
  namespace: kratos
type: Opaque
stringData:
  secret: "${JWT_SECRET}"
---
apiVersion: v1
kind: Secret
metadata:
  name: kratos-api-keys
  namespace: kratos
type: Opaque
stringData:
  openai-api-key: "${OPENAI_API_KEY}"
  anthropic-api-key: "${ANTHROPIC_API_KEY}"
  openrouter-api-key: "${OPENROUTER_API_KEY}"
  deepgram-api-key: "${DEEPGRAM_API_KEY}"
  elevenlabs-api-key: "${ELEVENLABS_API_KEY}"
