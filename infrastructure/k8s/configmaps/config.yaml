apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-app-config
  namespace: kratos
data:
  app_name: "KRATOS"
  environment: "production"
  debug: "false"
  weaviate_url: "http://kratos-weaviate:8080"
  sandbox_image: "kratos/sandbox:latest"
  sandbox_timeout_seconds: "300"
  max_agent_iterations: "25"
  jwt_algorithm: "HS256"
  jwt_expiry_hours: "24"
  cors_origins: "https://kratos.ai"
  log_level: "INFO"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-nginx-config
  namespace: kratos
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      upstream core_api { server kratos-core-api:8000; }
      upstream bff { server kratos-bff:3001; }
      upstream frontend { server kratos-frontend:3000; }

      server {
        listen 80;
        server_name kratos.ai;
        return 301 https://$host$request_uri;
      }

      server {
        listen 443 ssl http2;
        server_name kratos.ai;

        ssl_certificate /etc/letsencrypt/live/kratos.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kratos.ai/privkey.pem;

        location /ws {
          proxy_pass http://bff;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 86400;
        }

        location /api/v1/ {
          proxy_pass http://core_api;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
          proxy_pass http://bff;
          proxy_set_header Host $host;
        }

        location / {
          proxy_pass http://frontend;
          proxy_set_header Host $host;
        }
      }
    }
