apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratos-core-api
  namespace: kratos
  labels:
    app: kratos-core-api
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kratos-core-api
  template:
    metadata:
      labels:
        app: kratos-core-api
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/api/v1/system/metrics"
    spec:
      serviceAccountName: kratos-core
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: ghcr.io/kratos/core-api:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kratos-database
              key: url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: kratos-redis
              key: url
        - name: WEAVIATE_URL
          valueFrom:
            configMapKeyRef:
              name: kratos-app-config
              key: weaviate_url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kratos-jwt
              key: secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kratos-api-keys
              key: openai-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: kratos-api-keys
              key: anthropic-api-key
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kratos-core-api
  namespace: kratos
  labels:
    app: kratos-core-api
spec:
  type: ClusterIP
  selector:
    app: kratos-core-api
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kratos-core-api-hpa
  namespace: kratos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kratos-core-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kratos-core-api-pdb
  namespace: kratos
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: kratos-core-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kratos-core
  namespace: kratos
