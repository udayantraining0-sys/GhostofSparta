apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratos-frontend
  namespace: kratos
  labels:
    app: kratos-frontend
    component: frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kratos-frontend
  template:
    metadata:
      labels:
        app: kratos-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/kratos/frontend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://kratos.ai/api"
        - name: NEXT_PUBLIC_WS_URL
          value: "wss://kratos.ai/ws"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kratos-frontend
  namespace: kratos
  labels:
    app: kratos-frontend
spec:
  type: ClusterIP
  selector:
    app: kratos-frontend
  ports:
  - port: 3000
    targetPort: 3000
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kratos-frontend-hpa
  namespace: kratos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kratos-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kratos-frontend-pdb
  namespace: kratos
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kratos-frontend
