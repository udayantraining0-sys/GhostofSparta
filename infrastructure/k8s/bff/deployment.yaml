apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratos-bff
  namespace: kratos
  labels:
    app: kratos-bff
    component: gateway
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kratos-bff
  template:
    metadata:
      labels:
        app: kratos-bff
        component: gateway
    spec:
      containers:
      - name: bff
        image: ghcr.io/kratos/bff:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        - containerPort: 3001
          name: ws
        env:
        - name: CORE_API_URL
          value: "http://kratos-core-api:8000"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: kratos-redis
              key: url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kratos-bff
  namespace: kratos
  labels:
    app: kratos-bff
spec:
  type: ClusterIP
  selector:
    app: kratos-bff
  ports:
  - port: 3001
    targetPort: 3001
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kratos-bff-hpa
  namespace: kratos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kratos-bff
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kratos-bff-pdb
  namespace: kratos
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kratos-bff
