name: CD - Build & Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kratos

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - context: frontend
            image: frontend
            dockerfile: frontend/Dockerfile
          - context: backend/core
            image: core-api
            dockerfile: backend/core/Dockerfile
          - context: backend/bff
            image: bff
            dockerfile: backend/bff/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: kratos-staging
          location: us-central1
      - uses: deliverybot/helm@v1
        with:
          release: kratos
          namespace: kratos
          chart: ./infrastructure/k8s/helm
          values: |
            global:
              imageTag: ${{ github.sha }}
            ${{ toYaml(values) }}
          value-files: ./infrastructure/k8s/helm/values-staging.yaml
          atomic: true
          timeout: 10m

  deploy-production:
    name: Deploy to Production
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PRODUCTION }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: kratos-production
          location: us-central1
      - uses: deliverybot/helm@v1
        with:
          release: kratos
          namespace: kratos
          chart: ./infrastructure/k8s/helm
          values: |
            global:
              imageTag: ${{ github.ref_name }}
          value-files: ./infrastructure/k8s/helm/values-production.yaml
          atomic: true
          timeout: 15m
