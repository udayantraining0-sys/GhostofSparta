name: CI - Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  backend-core:
    name: Backend Core - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest pytest-asyncio
      - run: ruff check .
      - run: pytest tests/ -v --asyncio-mode=auto || echo "No tests yet"

  backend-bff:
    name: Backend BFF - Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/bff/package-lock.json
      - run: npm ci
      - run: npm run typecheck
